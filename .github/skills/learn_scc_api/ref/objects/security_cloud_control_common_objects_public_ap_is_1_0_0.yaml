    UsageConflictError:
      type: object
      description: >
        Response body for HTTP 409 Conflict when deleting a network object or
        group that is still in use.

        May include usage location details in `usageLocations`.
      required:
        - code
        - message
        - usageLocations
      properties:
        code:
          type: string
          description: Machine-readable error identifier; values may vary by release
        message:
          type: string
          description: Human-readable error description
        objectId:
          type: string
          format: uuid
          description: ID of the object/group that cannot be deleted
        objectName:
          type: string
          description: Name of the object/group that cannot be deleted
        objectType:
          type: string
          enum:
            - network_object
            - network_group
          description: Type of the object that cannot be deleted
        usageLocations:
          type: array
          description: List of locations where the object/group is being used
          items:
            type: object
            required:
              - locationType
              - locationName
              - count
            properties:
              locationType:
                type: string
                enum:
                  - policy
                  - network_group
                  - firewall_rule
                  - routing_rule
                  - other
                description: Type of location where the object is used
              locationName:
                type: string
                description: Human-readable name of the location
                example: Security Policies
              product:
                type: string
                enum:
                  - sdWan
                  - secureAccess
                  - scc
                description: Product where this usage exists
              count:
                type: integer
                description: Number of items using the object at this location
                example: 7
              navigationUrl:
                type: string
                description: >-
                  Optional URL to navigate to this location in the product UI.
                  For external product policies, this would link to their policy
                  management page.
                example: /security/policies
              items:
                type: array
                description: >
                  List of specific items using the object. This field is
                  optional and may not be populated

                  for external product policies where individual policy line
                  items are not exposed through this API.

                  Often populated when the usage location is another network
                  group managed here.
                items:
                  type: object
                  required:
                    - id
                    - name
                  properties:
                    id:
                      type: string
                      description: ID of the item using the object
                    name:
                      type: string
                      description: Name of the item using the object
                    type:
                      type: string
                      description: Type of the item
                      example: network_group
                    navigationUrl:
                      type: string
                      description: Optional URL to navigate directly to this item
                  description: List of items
            description: List of items
    Pagination:
      type: object
      description: >-
        Pagination information for list responses. Supports both offset-based
        and cursor-based pagination.
      properties:
        limit:
          type: integer
          description: Maximum number of items returned in this response
        offset:
          type: integer
          description: Number of items skipped (for offset-based pagination)
        total:
          type: integer
          description: Total number of items matching the query
        hasMore:
          type: boolean
          description: Whether there are more items available after this page
        next:
          type: string
          nullable: true
          description: Cursor for the next page of results (null if no more results)
        prev:
          type: string
          nullable: true
          description: Cursor for the previous page of results (null if at beginning)
    BulkObjectsRequest:
      type: object
      description: >-
        Request payload for bulk object retrieval with optional expansion
        control
      required:
        - ids
      properties:
        ids:
          type: array
          description: List of object/group UUIDs to retrieve
          items:
            type: string
            format: uuid
            description: Object or group UUID
          minItems: 1
          maxItems: 1000
        expandObjects:
          type: boolean
          description: >
            Control the level of detail in nested objects and groups:

            - true: Return full details for nested memberObjects and
            memberGroups (includes all fields, metadata, computedMetadata)

            - false: Return only id, secondaryId, and name for nested
            memberObjects and memberGroups
          default: false
    BulkObjectsResponse:
      type: object
      description: Response payload for bulk object retrieval
      required:
        - objects
      properties:
        objects:
          type: array
          description: >-
            Array of resolved objects (network objects and/or groups). Excludes
            computedMetadata. When expandObjects=true, groups are returned as
            ExpandedNetworkGroup with full member details.
          items:
            anyOf:
              - $ref: '#/components/schemas/BulkNetworkObjectResponse'
              - $ref: '#/components/schemas/BulkNetworkGroupResponse'
              - $ref: '#/components/schemas/ExpandedNetworkGroup'
    BulkNetworkObjectResponse:
      type: object
      description: Network object response for bulk operations (excludes computedMetadata)
      required:
        - id
        - name
        - type
        - subtype
        - value
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the network object
        secondaryId:
          type: integer
          description: Secondary identifier for the network object
        type:
          type: string
          enum:
            - network
          description: Object type
        name:
          type: string
          description: Name of the network object
        subtype:
          type: string
          enum:
            - host
            - range
            - cidr
            - fqdn
          description: Network object subtype
        value:
          type: string
          description: 'Network value (IP, CIDR, FQDN, etc.)'
        description:
          type: string
          description: Optional description
        metadata:
          type: object
          description: Metadata containing audit information
          properties:
            createdAt:
              type: string
              format: date-time
              description: Timestamp when the object was created
            updatedAt:
              type: string
              format: date-time
              description: Timestamp when the object was last updated
            createdBy:
              type: string
              description: User who created the object
            updatedBy:
              type: string
              description: User who last updated the object
            version:
              type: integer
              description: Version number for optimistic concurrency control
        memberOf:
          type: array
          description: Groups this object belongs to
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                description: UUID of the parent network group
              secondaryId:
                type: integer
                description: Secondary identifier of the parent network group
              name:
                type: string
                description: Name of the parent network group
    BulkNetworkGroupResponse:
      type: object
      description: Network group response for bulk operations (excludes computedMetadata)
      required:
        - id
        - name
        - type
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the network group
        secondaryId:
          type: integer
          description: Secondary identifier for the network group
        type:
          type: string
          enum:
            - networkGroup
          description: Object type
        name:
          type: string
          description: Name of the network group
        description:
          type: string
          description: Optional description
        metadata:
          type: object
          description: Metadata containing audit information
          properties:
            createdAt:
              type: string
              format: date-time
              description: Timestamp when the group was created
            updatedAt:
              type: string
              format: date-time
              description: Timestamp when the group was last updated
            createdBy:
              type: string
              description: User who created the group
            updatedBy:
              type: string
              description: User who last updated the group
            version:
              type: integer
              description: Version number for optimistic concurrency control
        memberObjects:
          type: array
          description: 'Member object references (id, secondaryId, name only)'
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                description: UUID of the member network object
              secondaryId:
                type: integer
                description: Secondary identifier of the member network object
              name:
                type: string
                description: Name of the member network object
        memberGroups:
          type: array
          description: 'Member group references (id, secondaryId, name only)'
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                description: UUID of the member network group
              secondaryId:
                type: integer
                description: Secondary identifier of the member network group
              name:
                type: string
                description: Name of the member network group
        inlineObjects:
          type: array
          description: Inline network objects
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                description: Unique identifier for the inline object
              secondaryId:
                type: integer
                description: Secondary identifier for the inline object
              subtype:
                type: string
                enum:
                  - host
                  - range
                  - cidr
                  - fqdn
                description: Network object subtype
              value:
                type: string
                description: 'Network value (IP address, CIDR, FQDN, etc.)'
        memberOf:
          type: array
          description: Groups this group belongs to
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                description: UUID of the parent network group
              secondaryId:
                type: integer
                description: Secondary identifier of the parent network group
              name:
                type: string
                description: Name of the parent network group
