  '/organizations/{orgID}/domains/global/objects/networks':
    post:
      summary: Create network object
      description: >
        Create a new network object.

        **Organization Limit**: Each organization is limited to a maximum of
        100,000 network objects.

        If this limit is reached, a 422 Unprocessable Entity response will be
        returned.

        To create new objects, you must first delete existing unused network
        objects.
      operationId: createNetworkObject
      tags:
        - Objects Endpoints
      parameters:
        - $ref: '#/components/parameters/orgID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNetworkObjectRequest'
            examples:
              host_object:
                summary: Create a host object
                value:
                  name: web-server-01
                  subtype: host
                  value: 192.168.1.10
                  description: Primary web server in DMZ
              cidr_object:
                summary: Create a CIDR object
                value:
                  name: corporate-network
                  subtype: cidr
                  value: 10.0.0.0/8
                  description: Corporate internal network
              fqdn_object:
                summary: Create an FQDN object
                value:
                  name: api-endpoint
                  subtype: fqdn
                  value: api.example.com
                  description: External API endpoint
      responses:
        '201':
          description: Network object created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkObjectWithoutUsage'
              examples:
                created_object:
                  summary: Created network object response
                  value:
                    id: 123e4567-e89b-12d3-a456-426614174000
                    secondaryId: 12345
                    type: network
                    name: web-server-01
                    subtype: host
                    value: 192.168.1.10
                    description: Primary web server in DMZ
                    metadata:
                      createdAt: '2025-10-30T10:00:00Z'
                      updatedAt: '2025-10-30T10:00:00Z'
                      createdBy: user@cisco.com
                      updatedBy: user@cisco.com
                      version: 1
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '421':
          $ref: '#/components/responses/MisdirectedRequest'
        '422':
