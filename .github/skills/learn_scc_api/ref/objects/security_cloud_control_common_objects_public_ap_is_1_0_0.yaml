openapi: 3.0.3
info:
  title: Security Cloud Control - Common Objects Public APIs
  description: >
    Public APIs for Common Objects, allowing external systems to query and
    manage network objects and groups.


    ## Authentication

    All API requests require Bearer token authentication using SCC API Key
    tokens with appropriate scopes.

    Include the token in the Authorization header:

    ```

    Authorization: Bearer <SCC API Key Token>

    ```


    ## Regional Routing

    The service is available in multiple regions.

    API keys belong to a Security Cloud Control organization in a specific
    region.

    Send requests to the regional API base URL that matches your organization.

    - **US (North America)**: https://api.security.cisco.com

    - **EU (Europe)**: https://api.eu.security.cisco.com

    - **IN (India)**: https://api.in.security.cisco.com

    - **APJ (Asia Pacific Japan)**: https://api.apj.security.cisco.com

    - **AU (Australia)**: https://api.au.security.cisco.com

    - **UAE (Middle East)**: https://api.uae.security.cisco.com


    Using the wrong region will result in a 421 (Misdirected Request) error.


    ## Error Handling

    The API uses standard HTTP status codes for errors. Error response bodies
    are JSON objects

    with at least a human-readable `message`. Additional fields

    (e.g. `code`, `details`, `field`, `trackingId`, `metadata`) may be present.

    Prefer HTTP status codes when handling errors.
  version: 1.0.0
  contact:
    name: Cisco Support
    url: 'https://www.cisco.com/c/en/us/support/index.html'
servers:
  - url: 'https://api.security.cisco.com/v1'
    description: Production - US (North America)
  - url: 'https://api.eu.security.cisco.com/v1'
    description: Production - EU (Europe)
  - url: 'https://api.in.security.cisco.com/v1'
    description: Production - IN (India)
  - url: 'https://api.apj.security.cisco.com/v1'
    description: Production - APJ (Asia Pacific Japan)
  - url: 'https://api.au.security.cisco.com/v1'
    description: Production - AU (Australia)
  - url: 'https://api.uae.security.cisco.com/v1'
    description: Production - UAE (Middle East)
security:
  - bearerAuth: []
tags:
  - name: Objects Endpoints
    description: Endpoints for managing network objects and network groups
paths:
  '/organizations/{orgID}/domains/global/objects':
    get:
      summary: List network objects and groups
      description: >
        Lightweight endpoint to retrieve network objects or groups with basic
        details (no timestamps or audit fields).
      operationId: listObjects
      tags:
        - Objects Endpoints
      parameters:
        - $ref: '#/components/parameters/orgID'
        - name: type
          in: query
          required: false
          description: >-
            Type of objects to retrieve (optional - if not specified, returns
            both objects and groups). If both types are specified, the response
            will be a mixed list of objects and groups.
          schema:
            type: string
            enum:
              - network
              - networkGroup
              - network|networkGroup
            description: 'Allowed values: network, networkGroup, network|networkGroup'
          example: network
        - name: subtype
          in: query
          description: >-
            Filter by network object subtype (only applicable for networkObject
            type). If multiple subtypes are specified, the response will be a
            mixed list of objects with the specified subtypes.
          schema:
            type: string
            enum:
              - host
              - range
              - cidr
              - fqdn
              - host|range|cidr|fqdn
            description: 'Allowed values: host, range, cidr, fqdn, host|range|cidr|fqdn'
        - name: search
          in: query
          description: >
            Unified search across name, description, creator, and values
            (case-insensitive partial match).

            Searches network object values (IP addresses, CIDRs, FQDNs, ranges)
            and inline object values within groups.

            This provides a single search experience where users can find
            objects by any remembered text.
          schema:
            type: string
            description: Search term to filter objects
          examples:
            byName:
              summary: Search by object name
              value: prod-server
            byIP:
              summary: Search by IP address
              value: 192.168.1
            byFQDN:
              summary: Search by FQDN
              value: example.com
        - name: value
          in: query
          description: >
            Filter objects by value only (partial match). Use this for precise
            value-only filtering.

            For general search, prefer the 'search' parameter which searches all
            fields including values.
          schema:
            type: string
            maxLength: 255
            description: Partial value to search for (case-insensitive)
        - name: usableBy
          in: query
          description: Filter by which product can use the objects/groups
          schema:
            type: string
            description: Product identifier
            example: sdWan
          examples:
            sdWan:
              summary: Filter for SD-WAN usable objects
              value: sdWan
            secureAccess:
              summary: Filter for Secure Access usable objects
              value: secureAccess
        - name: ipVersionsPresent
          in: query
          description: |
            Filter by IP versions present (only applicable for SDWAN objects)
            <br>**NOTE**: Works only when 'usableBy' filter is set to 'sdWan'
          schema:
            type: string
            enum:
              - ipv4
              - ipv6
              - ipv4|ipv6
            description: 'Allowed values: ipv4, ipv6, ipv4|ipv6'
        - name: memberOf
          in: query
          description: Filter all the members of the group with the given ID
          schema:
            type: string
            description: Group ID
            format: uuid
        - name: sort
          in: query
          description: Sort order of the items
          schema:
            type: string
            description: 'Allowed values: updatedAt, createdAt, name'
            pattern: '^(updatedAt|createdAt|name):(asc|desc)$'
            default: 'updatedAt:desc'
          examples:
            updatedAtDesc:
              summary: Sort by updatedAt in descending order
              value: 'updatedAt:desc'
            updatedAtAsc:
              summary: Sort by updatedAt in ascending order
              value: 'updatedAt:asc'
            createdAtAsc:
              summary: Sort by createdAt in ascending order
              value: 'createdAt:asc'
            createdAtDesc:
              summary: Sort by createdAt in descending order
              value: 'createdAt:desc'
            nameAsc:
              summary: Sort by name in ascending order
              value: 'name:asc'
            nameDesc:
              summary: Sort by name in descending order
              value: 'name:desc'
        - name: limit
          in: query
          description: Maximum number of items to return
          schema:
            type: integer
            minimum: 1
            maximum: 250
            default: 30
            description: 'Integer parameter, minimum: 1, maximum: 250, default: 30'
        - name: offset
          in: query
          description: Number of items to skip before starting to collect the result set
          schema:
            type: integer
            minimum: 0
            default: 0
            description: 'Integer parameter, minimum: 0, default: 0'
        - name: next
          in: query
          description: >-
            Cursor for pagination - use the 'next' cursor value from previous
            response
          schema:
            type: string
            description: String parameter value
        - name: prev
          in: query
          description: >-
            Cursor for reverse pagination - use the 'prev' cursor value from
            previous response
          schema:
            type: string
            description: String parameter value
        - name: secondaryIds
          in: query
          description: >
            Filter by secondary IDs (Secure Access integer IDs).

            Provide comma-separated positive integers. Maximum 100 IDs per
            request.
          schema:
            type: string
            pattern: '^[0-9]+(,[0-9]+)*,?$'
            description: Comma-separated list of secondary IDs (positive integers)
          examples:
            singleId:
              summary: Filter by single secondary ID
              value: '10093325'
            multipleIds:
              summary: Filter by multiple secondary IDs
              value: '10093325,10000244'
      responses:
        '200':
          description: List of network objects and/or groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectsListResponse'
              examples:
                networkObjects:
                  summary: List of network objects (when type=networkObject)
