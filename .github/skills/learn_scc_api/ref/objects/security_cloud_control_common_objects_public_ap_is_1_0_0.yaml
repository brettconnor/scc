      operationId: getObjectById
      tags:
        - Objects Endpoints
      parameters:
        - $ref: '#/components/parameters/orgID'
        - name: id
          in: path
          required: true
          description: Unique identifier of the network object or group
          schema:
            type: string
            format: uuid
            description: String parameter value
      responses:
        '200':
          description: Network object or group details
          content:
            application/json:
              schema:
                anyOf:
                  - $ref: '#/components/schemas/NetworkObject'
                  - $ref: '#/components/schemas/NetworkGroup'
