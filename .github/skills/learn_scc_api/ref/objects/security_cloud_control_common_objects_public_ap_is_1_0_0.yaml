    NetworkObjectWithoutUsage:
      type: object
      description: >-
        Network object representation without usage tracking information (used
        in create/update responses)
      required:
        - id
        - name
        - subtype
        - value
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the network object
          readOnly: true
        secondaryId:
          type: integer
          description: Secondary identifier for the network object
          readOnly: true
        type:
          type: string
          enum:
            - network
          readOnly: true
          description: 'Object type, always "network" for network objects'
        name:
          type: string
          minLength: 1
          maxLength: 32
          pattern: '^[a-zA-Z0-9_.\ -]+$'
          description: >
            Unique among network objects and network groups in your
            organization's global object scope (case-insensitive for
            uniqueness).

            A network object and a network group cannot share the same name in
            that scope.

            Allowed: alphanumeric (a-z, A-Z, 0-9), underscore (_), hyphen (-),
            period (.), and space (discouraged).

            Prohibited: Special characters, leading/trailing spaces, consecutive
            spaces.

            Maximum length: 32 characters.

            Names preserve original case for display but are compared
            case-insensitively for uniqueness.
        subtype:
          type: string
          enum:
            - host
            - range
            - cidr
            - fqdn
          description: |
            Network object subtype:
            - host: Single IP address
            - range: Range of IP addresses
            - cidr: Network in CIDR notation
            - fqdn: Fully Qualified Domain Name
        value:
          type: string
          minLength: 1
          maxLength: 255
          description: The network value based on subtype
        description:
          type: string
          maxLength: 1000
          description: Optional description
        metadata:
          type: object
          description: Metadata containing audit information
          properties:
            createdAt:
              type: string
              format: date-time
              description: Timestamp when the object was created
              readOnly: true
            updatedAt:
              type: string
              format: date-time
              description: Timestamp when the object was last updated
              readOnly: true
            createdBy:
              type: string
              description: User who created the object
              readOnly: true
            updatedBy:
              type: string
              description: User who last updated the object
              readOnly: true
            version:
              type: integer
              description: Version number for optimistic concurrency control
              readOnly: true
        computedMetadata:
          type: object
          description: Computed metadata about the network object
          readOnly: true
          properties:
            ipVersion:
              type: string
              enum:
                - ipv4
                - ipv6
                - none
              description: IP version (none for FQDN objects)
