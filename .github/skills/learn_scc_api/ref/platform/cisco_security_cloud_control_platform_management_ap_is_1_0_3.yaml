    Product:
      type: object
      description: Represents a product associated with a role
      properties:
        key:
          type: string
          description: Product key identifier
          example: secure-workload
        name:
          type: string
          description: Name of the product
          example: Cisco Secure Workload
    Role:
      type: object
      description: |-
        Represents a role within an organization. Supports multiple role types with different structures.

        **Role Types:**
        1. **STATIC Roles** - System-defined roles provided by the platform
           - Fields: id, displayName, description, type, products
           - Products include: key, name
           - Example:
           {
               "id": "6280494d-dd0f-4655-b558-111111111114",
               "displayName": "Test platform product 2 display name",
               "description": "Test platform product 2 description",
               "type": "STATIC",
               "products": [
                   {
                       "key": "platform-test-product2",
                       "name": "Test Platform Product 2"
                   }
               ]
           }

        2. **CUSTOM Roles** - User-created roles tailored to organizational needs
           - Fields: id, displayName, type, products
           - Products include: id, key, name
           - Example:
           {
               "id": "01a8c996-4297-426e-8e23-9034b267a423",
               "displayName": "New role 1",
               "type": "CUSTOM",
               "products": [
                   {
                       "key": "test-product-1",
                       "name": "Test Product 1"
                   }
               ]
           }
      properties:
        id:
          type: string
          description: Unique identifier for the role
          example: 01a8c996-4297-426e-8e23-9034b267a423
        displayName:
          type: string
          description: Display name of the role
          example: Paul test 2
        description:
          type: string
          description: Description of the role
          example: This is a role for managing workloads
        type:
          type: string
          description: Type of the role
          enum:
          - CUSTOM
          - STATIC
          example: CUSTOM
        products:
          type: array
          description: List of products associated with the role
          example:
          - key: secure-workload
            name: Cisco Secure Workload
          items:
            $ref: "#/components/schemas/Product"
    RolesResponse:
      type: object
      description: Response containing a list of roles
      properties:
        roles:
          type: array
          description: List of roles within the organization
          example:
          - id: 6280494d-dd0f-4655-b558-111111111114
            displayName: Test platform product 2 display name
            description: Test platform product 2 description
            type: STATIC
            products:
            - key: platform-test-product2
              name: Test Platform Product 2
          items:
            $ref: "#/components/schemas/Role"
    ListManagedOrganizationByGroupResponse:
