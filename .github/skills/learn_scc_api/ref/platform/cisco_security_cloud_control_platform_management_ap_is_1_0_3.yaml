  parameters:
    orgId:
      name: orgId
      in: path
      description: Unique identifier of the organization. This is a UUID string.
      required: true
      schema:
        type: string
        minLength: 1
        pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
      example: 123e4567-e89b-12d3-a456-426614174000
    groupId:
      name: groupId
      in: path
      description: Unique identifier of the group. This is a UUID string.
      required: true
      schema:
        type: string
        minLength: 1
        pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
      example: e980e881-b61f-11f0-a9b4-06fbd2118f4e
    roleId:
      name: roleId
      in: path
      description: Unique identifier of the role. This is a UUID string.
      required: true
      schema:
        type: string
        minLength: 1
        pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
      example: f091f992-c72a-22a1-b9c5-17aed3229a5f
    userId:
      name: userId
      in: path
      description: Unique identifier of the user.
      required: true
      schema:
        type: string
        maxLength: 20
        minLength: 20
        pattern: "^[0-9a-zA-Z]{20}$"
      example: 00u2k67hy1xf3mRxG0h8
    subscriptionId:
      name: subscriptionId
      in: path
      description: Unique identifier of the subscription. This is a UUID string.
      required: true
      schema:
        type: string
        minLength: 1
        pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
      example: 987fcdeb-51a2-43f1-b456-123456789abc
    apiKeyId:
      name: apiKeyId
      in: path
      description: Unique identifier of the API key. This is a UUID string.
      required: true
      schema:
        type: string
        minLength: 1
        pattern: "^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$"
      example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
    max:
      name: max
      in: query
      description: The maximum number of items to return on a page in the response.
      required: false
      schema:
        type: integer
        format: int32
        default: 100
        maximum: 500
        minimum: 1
      example: 100
    cursor:
      name: cursor
      in: query
      description: The place in the collection where the system fetches the next set
        of results.
      required: false
      schema:
        type: string
      example: 30bc93c6-e5fb-31fc-8947-80d053feff40
    sortBy:
      name: sortBy
      in: query
      description: "Sort the collection by the field name. Supported values are `name`,\
        \ `type`, and `regionCode`."
      required: false
      schema:
        type: string
        enum:
        - name
        - type
        - regionCode
      example: name
    order:
      name: order
      in: query
      description: "Sort the collection by the specified order, either `asc` or `desc`."
      required: false
      schema:
        type: string
        enum:
        - asc
        - desc
      example: asc
  headers:
    Content-Type:
      description: The MIME content type of the response body.
      schema:
        type: string
      example: application/json
    Date:
      description: The timestamp of the response.
      schema:
        type: string
        pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
      example: 2025-03-14T18:34:25Z
    trackingId:
      description: Unique identifier to help debug the flow.
      schema:
        type: string
        format: uuid
      example: e9022120-96ef-4208-8ce4-be7a40c4b8cc
  securitySchemes:
    bearerHttpAuthentication:
      type: http
      description: |
        JWT Authorization header using the Bearer scheme. Example: 'Bearer {token}'.
        Required scopes: security:enterprise:member (Read organizations),
        security:enterprise:admin (Write organizations)
      scheme: bearer
      bearerFormat: JWT
    refreshTokenAuth:
      type: http
      description: Refresh token for obtaining a new access token
      scheme: bearer
      bearerFormat: JWT
