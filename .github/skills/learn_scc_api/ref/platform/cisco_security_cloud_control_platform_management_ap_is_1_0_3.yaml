    RefreshTokenFormRequest:
      type: object
      description: Form data required to refresh an access token using a refresh token
        grant.
      properties:
        grant_type:
          type: string
          description: The grant type for the token request
          example: refresh_token
      required:
      - grant_type
    Permission:
      type: object
      description: "Represents a permission associated with an access token, defining\
        \ the role and scope of access for a specific product or service."
      properties:
        roleId:
          type: string
          description: Unique identifier for the role assigned to the user. This is
            a UUID string.
          example: 27092051-0c68-411e-b62a-33bc807f3dbb
        roleName:
          type: string
          description: "Full name of the role, including the product or service name."
          example: Security Cloud Control - Administrator
        product:
          type: string
          description: Name of the product or service to which this permission applies.
          example: Security Cloud Control
        productKey:
          type: string
          description: Unique key identifier for the product or service.
          example: enterprise
        roleDisplayName:
          type: string
          description: "Human-readable display name for the role, typically shown\
            \ in user interfaces."
          example: Organization Administrator
        productInstanceId:
          type: string
          description: Identifier for the specific instance of the product or service.
          example: enterprise-default-instance
        roleType:
          type: string
          description: "Type of the role, indicating whether it's static (predefined)\
            \ or dynamic (custom)."
          example: static
        applicationScopeIds:
          type: array
          description: List of application scope identifiers that define the boundaries
            of access for this permission.
          items:
            type: string
    RefreshTokenResponse:
      type: object
      description: The properties of the response that contain the new access token
        and related information.
      example:
        access_token: eyJhbGciOiJSUzI1NiJ9...
        expires_in: 64799
        refresh_token: RjFhMGZkYzctYTI2My00Njc2LTgyMWUtZDljNjhjMGMyYTk0...
        refresh_token_expires_in: 5183999
        token_type: Bearer
      properties:
        access_token:
          type: string
          description: The value of the access token used for API authentication.
          example: eyJhbGciOiJSUzI1NiJ9...
        expires_in:
          type: integer
          format: int32
          description: The time in seconds when the access token expires.
          example: 64799
        refresh_token:
          type: string
          description: The value of the refresh token to use for future token refresh
            operations.
          example: RjFhMGZkYzctYTI2My00Njc2LTgyMWUtZDljNjhjMGMyYTk0...
        refresh_token_expires_in:
          type: integer
          format: int32
          description: The time in seconds when the refresh token expires.
          example: 5183999
        token_type:
          type: string
          default: Bearer
          description: The type of the issued token.
          example: Bearer
        permissions:
          type: array
          description: List of permissions associated with the token.
          items:
            $ref: "#/components/schemas/Permission"
      required:
      - access_token
      - expires_in
      - refresh_token
      - refresh_token_expires_in
      - token_type
  responses:
    "400Error":
      description: "Bad Request: The request was invalid or cannot be otherwise served.\
        \ An accompanying error message will explain further."
      headers:
        Content-Type:
          $ref: "#/components/headers/Content-Type"
        Date:
          $ref: "#/components/headers/Date"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            trackingId: e722d145-7f32-4a73-986f-82f28c9bf6ce
            message: Bad Request
            timestamp: 2026-03-09T16:09:28.683007Z
            statusCode: 400
            path: "/v1/{resource}"
    "401Error":
      description: "Unauthorized: Authentication credentials were missing or incorrect."
      headers:
        Content-Type:
          $ref: "#/components/headers/Content-Type"
        Date:
          $ref: "#/components/headers/Date"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            trackingId: e722d145-7f32-4a73-986f-82f28c9bf6ce
            message: Unauthorized
            timestamp: 2026-03-09T16:09:28.683007Z
            statusCode: 401
            path: "/v1/{resource}"
    "403Error":
      description: "Forbidden: The request is understood, but it has been refused\
        \ or access is not allowed."
      headers:
        Content-Type:
          $ref: "#/components/headers/Content-Type"
        Date:
          $ref: "#/components/headers/Date"
